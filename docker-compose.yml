services:
  backend:
    build:
      context: ./backend
    container_name: backend
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    expose:
      - "8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:?POSTGRES_USER is required — see .env.example}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — see .env.example}@database:5432/${POSTGRES_DB:?POSTGRES_DB is required — see .env.example}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost}
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required — see .env.example}
    depends_on:
      database:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  database:
    container_name: database
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER is required — see .env.example}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required — see .env.example}
      - POSTGRES_DB=${POSTGRES_DB:?POSTGRES_DB is required — see .env.example}
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  uploads_data:
